name: Build luci-app-quickfile

# 触发条件：手动点击按钮触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      # ImmortalWrt 24.10.5, 架构 mediatek/filogic
      SDK_URL: "https://downloads.immortalwrt.org/releases/24.10.5/targets/mediatek/filogic/immortalwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
      PKG_REPO: "https://github.com/sbwml/luci-app-quickfile.git"

    steps:
    - name: 检出当前仓库代码
      uses: actions/checkout@v4

    - name: 初始化编译环境 (安装依赖)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: 下载并解压 ImmortalWrt SDK
      run: |
        wget -O sdk.tar.xz ${{ env.SDK_URL }}
        mkdir sdk
        tar -xvf sdk.tar.xz -C sdk --strip-components=1
        rm sdk.tar.xz

    - name: 拉取 quickfile 插件源码
      working-directory: ./sdk
      run: |
        git clone https://github.com/sbwml/luci-app-quickfile.git package/luci-app-quickfile

    - name: 更新并安装 Feeds (拉取依赖库)
      working-directory: ./sdk
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 自动生成 .config 配置文件
      working-directory: ./sdk
      run: |
        make defconfig
        # 强制将 quickfile 及其对应的中文语言包标记为模块(m)进行独立编译
        echo "CONFIG_PACKAGE_luci-app-quickfile=m" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-quickfile-zh-cn=m" >> .config
        # 重新生成配置以解决依赖关系
        make defconfig

    - name: 编译插件 (单线程输出详细日志)
      working-directory: ./sdk
      run: |
        make package/luci-app-quickfile/compile V=s

    - name: 收集生成的 .ipk 文件
      run: |
        mkdir -p ./artifact
        find ./sdk/bin/ -name "*.ipk" -exec cp {} ./artifact/ \;

    - name: 上传编译结果到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-quickfile-MT7981
        path: ./artifact/*.ipk
